services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobqueue
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      JOBQUEUE_REDIS_URL: redis://redis:6379/0
      JOBQUEUE_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/jobqueue
      JOBQUEUE_DATABASE_URL_ASYNC: postgresql+asyncpg://postgres:postgres@postgres:5432/jobqueue
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }

  worker:
    build: ./worker
    environment:
      JOBQUEUE_REDIS_URL: redis://redis:6379/0
      JOBQUEUE_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/jobqueue
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
